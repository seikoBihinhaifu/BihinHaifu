<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* ================================
      共通設定
    ================================ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }
    
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f9fafb;
      padding: 20px;
      font-size: 1rem;
    }
    
    h2 {
      text-align: center;
      margin-bottom: 12px;
    }

    h4 {
      text-align: center;
    }
    
    /* ================================
      テーブルスクロールラッパー（PCベース）
    ================================ */
    .table-wrapper {
      max-height: 65vh;
      width: 100%;
      overflow-y: auto;
      overflow-x: hidden;
    
      background: white;
      border-radius: 32px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    
      -webkit-overflow-scrolling: touch;
    }
    
    .table-wrapper table {
      width: 100%;
      border-collapse: collapse;
    }
    
    /* ================================
      テーブル
    ================================ */
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    /* ヘッダー固定 */
    thead th {
      position: sticky;
      top: 0;
      z-index: 5;
      background: #f3f4f6;
    }
    
    th, td {
      padding: 14px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 1rem;
      text-align: left;
    }
    
    /* 行状態 */
    tbody tr:hover {
      background: #f9fafb;
      cursor: pointer;
    }
    
    tr.selected {
      background: #fee2e2;
    }
    
    tr.working {
      background: #fff7ed;
    }
    
    tr.working:hover {
      background: #ffedd5;
    }
    
    /* ================================
      入力・ボタン
    ================================ */
    input,
    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 14px;
      font-size: 1.1rem;
    }
    
    input {
      background: white;
      border: 1px solid #d1d5db;
    }
    
    button {
      background: #ef4444;
      color: white;
      border: none;
      cursor: pointer;
    }
    
    button:disabled {
      background: #fca5a5;
    }
    
    /* 結果 */
    #result {
      text-align: center;
      margin-top: 12px;
    }
    
    /* ================================
      ボタン風リンク
    ================================ */
    a.button-link {
      display: inline-block;
      width: 100%;
      text-align: center;
      padding: 14px;
      margin-top: 12px;
    
      background: #ef4444;
      color: white;
      text-decoration: none;
    
      border-radius: 14px;
      font-size: 1.1rem;
      font-weight: 600;
    
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      transition: background 0.2s ease, transform 0.1s ease;
    }
    
    a.button-link:hover {
      background: #dc2626;
    }
    
    a.button-link:active {
      transform: translateY(1px);
    }
    
    /* ================================
      レイアウト
    ================================ */
    .page-container {
      max-width: 100%;
      margin: 0 auto;
    }
    
    .page-container > * {
      width: 100%;
    }
    
    /* ================================
      📱 スマホ用（上書き）
    ================================ */
    @media (max-width: 600px) {
    
      body {
        padding: 30px;
        font-size: 1rem;
      }
    
      h2 {
        font-size: 2rem;
        margin-bottom: 30px;
      }
    
      /* テーブル */
      th, td {
        padding: 14px;
        border-bottom: 2px solid #e5e7eb;
        font-size: 1rem;
        white-space: nowrap;
      }
    
      /* ラッパー高さ少し調整 */
      .table-wrapper {
        max-height: 60vh;
        box-shadow: 0 12px 30px rgba(0,0,0,0.1);
        overflow-x: auto;
        border-radius: 12px;
      }
    
      /* 行選択の差分 */
      tr.working.selected {
        background: #fed7aa;
      }
    
      /* 入力 */
      input,
      button {
        padding: 10px;
        margin-top: 20px;
        border-radius: 10px;
        font-size: 1rem;
      }
    
      /* 結果 */
      #result {
        margin-top: 28px;
        font-size: 1.2rem;
      }
    
      /* リンク */
      a.button-link {
        margin-top: 20px;
        padding: 16px;
        border-radius: 10px;
        font-size: 1.5rem;
        box-shadow: 0 8px 20px rgba(0,0,0,0.12);
      }
    
      a.button-link:active {
        transform: translateY(2px);
      }
    }

  </style>
</head>

<body>
  <div class="page-container">
  <h2>削除</h2>
  <h4>（行をクリックして削除・ビューは30秒ごとに自動更新されます）</h4>
  <div class="table-wrapper">
    <table id="idTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>出発地点</th>
          <th>備品名</th>
          <th>目的地</th>
          <th>数</th>
          <th>備考</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  </div>

  <input id="idInput" placeholder="削除するID（上のビューから選択）" readonly>
  <button id="deleteBtn" disabled>削除</button>

  <p id="result">表を読み込み中……</p>

  <a href="https://sites.google.com/seiko.ac.jp/bihin-haifu-henshu/%E7%B7%A8%E9%9B%86%E3%83%9A%E3%83%BC%E3%82%B8" class="button-link">戻る</a>

<script>
  const tbody = document.querySelector("#idTable tbody");
  const idInput = document.getElementById("idInput");
  const deleteBtn = document.getElementById("deleteBtn");
  const result = document.getElementById("result");

  const API_URL = "https://script.google.com/macros/s/AKfycbx8ZJ_0Jdvx27AMGrTs19Wj3kTzS04sgNUOouAGKSV1_sGnLF1odVzBMzRXc2hGBQI/exec";

  let selectedRow = null;

  // 一覧取得
  const createTable = async () => {
    console.log("実行されました");
    const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "getIdList"
        })
      });
    console.log("fetch終了しました。");
    const data = await res.json();
    console.log(data);
    if (data.status === "success") {
      tbody.innerHTML = "";
      if (!data.table || data.table.length === 0) {
        result.textContent = "データがありません";
        return;
      }

      data.table.forEach(row => {
        const tr = document.createElement("tr");

        // 業務中（G列）
        const isWorking =
          row[6] === true ||
          row[6] === "TRUE" ||
          row[6] === "true";

        if (isWorking) tr.classList.add("working");

        // 表示列：A, C, D, E, F, H
        const displayIndexes = [0, 2, 3, 4, 5, 7];
        displayIndexes.forEach(i => {
          const td = document.createElement("td");
          td.textContent = row[i] ?? "";
          tr.appendChild(td);
        });

        tr.addEventListener("click", () => {
          document.querySelectorAll("tr.selected")
            .forEach(r => r.classList.remove("selected"));

          tr.classList.add("selected");
          selectedRow = row;
          idInput.value = row[0];
          deleteBtn.disabled = false;
        });

        tbody.appendChild(tr);
      });
      result.textContent = "";
    } else {
      result.textContent = data.table;
    }
    
  }
  createTable();
  setInterval(createTable, 30000);

  deleteBtn.addEventListener("click", async () => {
    if (!selectedRow) return;

    const isWorking =
      selectedRow[6] === true ||
      selectedRow[6] === "TRUE" ||
      selectedRow[6] === "true";

    const ok = confirm(
      `以下を削除します。\n\n` +
      `ID: ${selectedRow[0]}\n` +
      `出発地点: ${selectedRow[2]}\n` +
      `備品名: ${selectedRow[3]}\n` +
      `目的地: ${selectedRow[4]}\n` +
      `数: ${selectedRow[5]}\n` +
      `備考：${selectedRow[7]}\n` +
      `業務中: ${isWorking ? "はい" : "いいえ"}\n\n` +
      `本当に削除しますか？`
    );
    if (!ok) return;

    deleteBtn.disabled = true;
    result.textContent = "削除中…";

    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "deleteDataById",
        id: selectedRow[0]
      })
    });
    const data = await res.json();

    if (data.status === "success") {
      result.textContent = data.message;
      idInput.textContent = ""; //readonlyだから消せなさそう（削除ボタンはdisabledになるのでシステム的な問題はない）
      tbody.innerHTML = "";
      createTable();
    } else {
      result.textContent = data.message;
      deleteBtn.disabled = false;
    }
  });
</script>

</body>
</html>
